name: Refresh Jira Snapshot
on:
  schedule:
    - cron: '0 13 * * *'   # 6 AM MST daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch Jira data
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: node scripts/fetch-jira.js
      - name: Commit snapshot
        run: |
          git config user.name "agile-pulse-bot"
          git config user.email "actions@github.com"
          git add public/jira-snapshot.json
          git diff --staged --quiet || git commit -m "📊 Daily Jira snapshot $(date -u +%Y-%m-%d)"
          git push origin main
